hostname spine
!
spanning-tree mode mstp
!
username admin privilege 15 role network-admin secret admin
!
interface Ethernet1
   description to_leaf1_Et2
   no switchport
   ip address 10.0.1.1/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
interface Ethernet2
   description to_leaf2_Et2
   no switchport
   ip address 10.0.2.1/30
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
interface Loopback0
   ip address 10.0.0.1/32
   ip ospf area 0.0.0.0
!
ip routing
!
router ospf 1
   router-id 10.0.0.1
   max-lsa 12000
!
router bgp 65000
   router-id 10.0.0.1
   no bgp default ipv4-unicast
   neighbor LEAF_OVERLAY peer group
   neighbor LEAF_OVERLAY update-source Loopback0
   neighbor LEAF_OVERLAY route-reflector-client
   neighbor LEAF_OVERLAY send-community extended
   neighbor 10.0.0.11 peer group LEAF_OVERLAY
   neighbor 10.0.0.11 remote-as 65000
   neighbor 10.0.0.12 peer group LEAF_OVERLAY
   neighbor 10.0.0.12 remote-as 65000
   !
   address-family evpn
      neighbor LEAF_OVERLAY activate
!
management api http-commands
   no shutdown
!
management ssh
   no shutdown
!
end
